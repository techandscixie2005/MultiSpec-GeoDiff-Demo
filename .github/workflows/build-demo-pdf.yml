name: Build Demo PDF

on:
  workflow_dispatch:
    inputs:
      query_id:
        description: 'Query ID for demo run'
        required: false
        default: '0'
        type: string

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            latex-cjk-all \
            fonts-noto-cjk \
            pandoc

      - name: Install Python dependencies
        run: |
          pip install numpy scipy matplotlib rdkit-pypi torch --quiet

      - name: Run demo to regenerate outputs
        run: |
          python 03_code/run_demo.py --query_id ${{ github.event.inputs.query_id }} --data 04_data/IR_nist_200.jsonl --top_k 5

      - name: Build PDF with pandoc
        run: |
          pandoc 02_demo_document/demo_report.md \
            -o 02_demo_document/MultiSpec-GeoDiff_Demo_说明.pdf \
            --pdf-engine=xelatex \
            -V documentclass=ctexart \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V colorlinks=true \
            --toc --toc-depth=2 --number-sections \
            --resource-path=.:02_demo_document

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiSpec-GeoDiff_Demo_说明
          path: 02_demo_document/MultiSpec-GeoDiff_Demo_说明.pdf
          retention-days: 30
