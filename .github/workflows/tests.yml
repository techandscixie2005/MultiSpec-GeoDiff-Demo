name: Tests

on:
  push:
    branches:
      - main
      - "demo-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "03_code/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 03_code/requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: 03_code/src
          MPLBACKEND: Agg
        run: |
          pytest 03_code/tests -q
